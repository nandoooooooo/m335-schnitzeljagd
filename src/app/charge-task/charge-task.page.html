<app-page-header title="Aufgabe 5" />

<ion-content [fullscreen]="true">

  <div class="task-page">

    <section class="task-card">
      <div class="task-meta text-secondary">
        <div>AUFGABE {{ task.index }} / {{ task.total }} •</div>
        <div [style.color]="timerColor()">{{ timerDisplay() }}</div>
      </div>
      <h2>{{ task.title }}</h2>
      <p class="text-secondary">{{ task.description }}</p>
    </section>

    <section class="task-card charge-card" [class.charge-card--active]="isCharging()">
      <div class="location-left">
        <div class="pin-wrapper">{{ isCharging() ? '🔋' : '🪫' }}</div>
        <div>
          <div class="location-title">Handy angeschlossen</div>
          <div class="location-subtitle text-secondary">{{ detected() }} / 1</div>
        </div>
      </div>
      <div class="bonus-pill">{{ task.bonusTime }}</div>
    </section>

    <section class="task-card">
      <div class="hint-label text-secondary">Hinweis</div>
      <div class="hint-text">{{ task.hint }}</div>
    </section>

  </div>

  <div class="task-actions">
    <ion-button expand="block" fill="outline" (click)="skip()">
      ⏭️ Überspringen
    </ion-button>
    <ion-button expand="block" fill="outline" (click)="cancel()">
      ❌ Abbrechen
    </ion-button>
  </div>

</ion-content>
