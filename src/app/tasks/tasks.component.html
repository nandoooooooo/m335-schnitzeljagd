<app-page-header title="Übersicht Aufgaben"></app-page-header>

<ion-content>
  <section class="container">
    <div class="tasks__hello-section">
      <div>
        <code class="text-secondary">Hallo, {{ playerName() }} 👋</code>
        <h3>Aufgaben</h3>
      </div>
      <div>
        <ion-button [color]="'danger'">Abbrechen</ion-button>
      </div>
    </div>

    <div class="tasks__completion">
      <div class="tasks__completion-labels">
        <code class="text-secondary">{{ completedTasksCount() }} / {{ totalTasksCount() }} erledigt</code>
        <code class="tasks__completion-percentage">{{ completionPercentage() }}%</code>
      </div>
      <ion-progress-bar [value]="completionProgress()" class="tasks__completion-bar"></ion-progress-bar>
    </div>

    <div class="tasks__progress-section">
      <div class="progress-stat">
        <div class="progress-stat__icon">🥩</div>
        <div class="progress-stat__value">{{ progressStats.schnitzel }}</div>
        <div class="progress-stat__label">Schnitzel</div>
      </div>

      <div class="progress-stat">
        <div class="progress-stat__icon">🥔</div>
        <div class="progress-stat__value">{{ progressStats.kartoffel }}</div>
        <div class="progress-stat__label">Kartoffel</div>
      </div>

      <div class="progress-stat">
        <div class="progress-stat__icon">⏱️</div>
        <div class="progress-stat__value">{{ totalTime() }}</div>
        <div class="progress-stat__label">Zeit</div>
      </div>
    </div>

    <div class="tasks__list">
      @for (task of tasks(); track task.id) {
        <app-task-card [task]="task" (taskClick)="onTaskClick($event)"></app-task-card>
      }
    </div>
  </section>
</ion-content>
